[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nanotrace"
version = "0.1.0"
description = "Python SDK for sending traces, logs, metrics, and spans to Nanotrace."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "Nanotrace" }
]
keywords = ["nanotrace", "observability", "tracing", "metrics", "logs"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed"
]

[project.urls]
Homepage = "https://github.com/suhjohn/nanotrace/tree/main/packages/sdk-py"
Repository = "https://github.com/suhjohn/nanotrace"
Issues = "https://github.com/suhjohn/nanotrace/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
nanotrace = ["py.typed"]
