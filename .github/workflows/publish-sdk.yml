name: Publish SDK

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @nanotrace/sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck SDK
        run: npm --workspace @nanotrace/sdk run typecheck

      - name: Build SDK
        run: npm --workspace @nanotrace/sdk run build

      - name: Publish SDK
        run: npm publish --workspace @nanotrace/sdk --access public --provenance
