name: nanotrace-dev

x-app-env: &app-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localstack:4566
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: nanotrace
  CLICKHOUSE_DATABASE: observatory
  CLICKHOUSE_TABLE: events
  CLICKHOUSE_EVENT_SERVING_INDEX_TABLE: event_index
  CLICKHOUSE_FIELD_INDEX_TABLE: field_index
  CLICKHOUSE_SPAN_FRAGMENTS_TABLE: span_fragments
  CLICKHOUSE_EVENT_MEASURES_TABLE: event_measures
  CLICKHOUSE_ENTITY_STATE_UPDATES_TABLE: entity_state_updates
  CLICKHOUSE_ENTITY_STATE_CURRENT_TABLE: entity_state_current
  DATABASE_URL: postgres://nanotrace:nanotrace@postgres:5432/nanotrace
  NANOTRACE_PUBLIC_BASE_URL: http://localhost:18473
  NANOTRACE_APP_BASE_URL: http://localhost:41233
  NANOTRACE_SESSION_SECURE: "false"
  NANOTRACE_CORS_ALLOWED_ORIGINS: http://localhost:41233,http://127.0.0.1:41233,http://localhost:41234,http://127.0.0.1:41234
  NANOTRACE_KAFKA_BROKERS: redpanda:9092
  NANOTRACE_KAFKA_INGEST_TOPIC: events.ingest.v1
  NANOTRACE_KAFKA_NORMALIZED_TOPIC: events.normalized.v1
  NANOTRACE_KAFKA_TABLEFLOW_TOPIC: events.tableflow.batches.v1
  NANOTRACE_KAFKA_INVALID_TOPIC: events.invalid.v1
  RUST_LOG: info

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      [
        "redpanda",
        "start",
        "--mode",
        "dev-container",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--check=false",
        "--kafka-addr",
        "internal://0.0.0.0:9092,external://0.0.0.0:19092",
        "--advertise-kafka-addr",
        "internal://redpanda:9092,external://localhost:19092"
      ]
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 60

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nanotrace
      POSTGRES_USER: nanotrace
      POSTGRES_PASSWORD: nanotrace
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanotrace -d nanotrace"]
      interval: 2s
      timeout: 5s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:25.12-alpine
    environment:
      CLICKHOUSE_DB: observatory
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nanotrace
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password nanotrace --query 'SELECT 1'"]
      interval: 2s
      timeout: 5s
      retries: 60

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: ses
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health').read()\""
        ]
      interval: 2s
      timeout: 5s
      retries: 60

  clickhouse-schema:
    image: node:24-alpine
    working_dir: /workspace
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nanotrace
      CLICKHOUSE_DATABASE: observatory
      CLICKHOUSE_TABLE: events
      CLICKHOUSE_SCHEMA_PATH: deploy/clickhouse/schema.sql
      CLICKHOUSE_RESET_DATABASE: ${CLICKHOUSE_RESET_DATABASE:-false}
    volumes:
      - .:/workspace:ro
    command: ["node", "scripts/apply-clickhouse-schema.mjs"]

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: nanotrace-dev-app:latest
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse-schema:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      <<: *app-env
      PORT: "18473"
    ports:
      - "18473:18473"

  normalizer:
    image: nanotrace-dev-app:latest
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse-schema:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      NANOTRACE_NORMALIZER_GROUP_ID: nanotrace-normalizer-dev
      NANOTRACE_NORMALIZER_CLIENT_ID: nanotrace-normalizer-dev
    command: ["/usr/local/bin/nanotrace-normalizer"]

  alerts:
    image: nanotrace-dev-app:latest
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse-schema:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      NANOTRACE_ALERTS_GROUP_ID: nanotrace-alerts-dev
      NANOTRACE_ALERTS_CLIENT_ID: nanotrace-alerts-dev
      NANOTRACE_ALERTS_DEFINITION_REFRESH_SECS: "5"
    command: ["/usr/local/bin/nanotrace-alerts"]

  alerts-notifier:
    image: nanotrace-dev-app:latest
    depends_on:
      clickhouse-schema:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      NANOTRACE_ALERTS_NOTIFIER: "true"
      NANOTRACE_ALERTS_CLIENT_ID: nanotrace-alerts-notifier-dev
      NANOTRACE_ALERTS_NOTIFY_POLL_SECS: "5"
      NANOTRACE_ALERTS_NOTIFY_BATCH_SIZE: "100"
    command: ["/usr/local/bin/nanotrace-alerts"]

  materializer:
    image: nanotrace-dev-app:latest
    depends_on:
      clickhouse-schema:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      NANOTRACE_TABLEFLOW_MATERIALIZE_LOOP: "true"
      NANOTRACE_TABLEFLOW_MATERIALIZER_GROUP_ID: nanotrace-tableflow-materializer-dev
      NANOTRACE_TABLEFLOW_MATERIALIZER_CLIENT_ID: nanotrace-tableflow-materializer-dev
    command: ["/usr/local/bin/nanotrace-lakehouse-rebuild"]

  ui:
    image: node:24-bookworm
    working_dir: /workspace
    depends_on:
      server:
        condition: service_started
    environment:
      NANOTRACE_URL: http://localhost:18473
      NANOTRACE_API_KEY: ntak_dev
      NANOTRACE_UI_PORT: "41233"
      VITE_NANOTRACE_API_KEY: ntak_dev
      VITE_NANOTRACE_URL: http://localhost:18473
    ports:
      - "41233:41233"
    volumes:
      - .:/workspace
      - ui-node-modules:/workspace/node_modules
      - ui-app-node-modules:/workspace/apps/ui/node_modules
    command: ["/bin/sh", "-ec", "npm ci && npm --workspace apps/ui run dev"]

volumes:
  clickhouse-data:
  localstack-data:
  postgres-data:
  redpanda-data:
  ui-node-modules:
  ui-app-node-modules:
