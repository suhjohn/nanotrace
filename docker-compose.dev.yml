name: nanotrace-dev

x-app-env: &app-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_S3_FORCE_PATH_STYLE: "true"
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: nanotrace
  CLICKHOUSE_DATABASE: observatory
  CLICKHOUSE_TABLE: events
  CLICKHOUSE_EVENT_SERVING_INDEX_TABLE: event_index
  CLICKHOUSE_FIELD_INDEX_TABLE: field_index
  CLICKHOUSE_SPAN_FRAGMENTS_TABLE: span_fragments
  CLICKHOUSE_EVENT_MEASURES_TABLE: event_measures
  CLICKHOUSE_ENTITY_STATE_UPDATES_TABLE: entity_state_updates
  NANOTRACE_POSTGRES_URL: postgres://nanotrace:nanotrace@postgres:5432/nanotrace
  NANOTRACE_DEV_BOOTSTRAP_API_KEY: ntak_dev
  NANOTRACE_PUBLIC_BASE_URL: http://localhost:18473
  NANOTRACE_APP_BASE_URL: http://localhost:41233
  NANOTRACE_SESSION_SECURE: "false"
  NANOTRACE_ALLOWED_EMAILS: "*"
  NANOTRACE_ADMIN_EMAILS: dev@localhost
  NANOTRACE_CORS_ALLOWED_ORIGINS: http://localhost:41233,http://127.0.0.1:41233,http://localhost:41234,http://127.0.0.1:41234
  NANOTRACE_S3_BUCKET: nanotrace-dev-events
  S3_BUCKET: nanotrace-dev-events
  S3_PREFIX: events
  PROCESSOR_S3_BUCKET: nanotrace-dev-events
  PROCESSOR_PREFIX: processors
  PROCESSOR_BUILDER_CMD: "true"
  RUST_LOG: info

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nanotrace
      POSTGRES_USER: nanotrace
      POSTGRES_PASSWORD: nanotrace
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanotrace -d nanotrace"]
      interval: 2s
      timeout: 5s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:25.12-alpine
    environment:
      CLICKHOUSE_DB: observatory
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nanotrace
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password nanotrace --query 'SELECT 1'"]
      interval: 2s
      timeout: 5s
      retries: 60

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,ses
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health').read()\""
        ]
      interval: 2s
      timeout: 5s
      retries: 60

  localstack-init:
    image: localstack/localstack:3
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack:4566
    volumes:
      - ./scripts/dev/localstack-init.sh:/etc/localstack-init.sh:ro
    entrypoint: ["/bin/sh", "/etc/localstack-init.sh"]

  clickhouse-schema:
    image: node:24-alpine
    working_dir: /workspace
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nanotrace
      CLICKHOUSE_DATABASE: observatory
      CLICKHOUSE_TABLE: events
      CLICKHOUSE_SCHEMA_PATH: deploy/clickhouse/schema.sql
      NANOTRACE_DEFAULT_TENANT_ID: org_default
    volumes:
      - .:/workspace:ro
    command: ["node", "scripts/apply-clickhouse-schema.mjs"]

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: nanotrace-dev-app:latest
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse-schema:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PORT: "18473"
      NANOTRACE_DATA_DIR: /data/events
    ports:
      - "18473:18473"
    volumes:
      - server-data:/data/events

  loader:
    image: nanotrace-dev-app:latest
    depends_on:
      server:
        condition: service_started
      clickhouse-schema:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      LOADER_SQS_QUEUE_URL: http://localstack:4566/000000000000/nanotrace-dev-events
      LOADER_POLL_WAIT_SECS: "1"
    command: ["/usr/local/bin/nanotrace-loader"]

  ui:
    image: node:24-bookworm
    working_dir: /workspace
    depends_on:
      server:
        condition: service_started
    environment:
      NANOTRACE_URL: http://localhost:18473
      NANOTRACE_API_KEY: ntak_dev
      NANOTRACE_UI_PORT: "41233"
      VITE_NANOTRACE_API_KEY: ntak_dev
      VITE_NANOTRACE_URL: http://localhost:18473
    ports:
      - "41233:41233"
    volumes:
      - .:/workspace
      - ui-node-modules:/workspace/node_modules
      - ui-app-node-modules:/workspace/apps/ui/node_modules
    command: ["/bin/sh", "-ec", "npm ci && npm --workspace apps/ui run dev"]

volumes:
  clickhouse-data:
  localstack-data:
  postgres-data:
  server-data:
  ui-node-modules:
  ui-app-node-modules:
